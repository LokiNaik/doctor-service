name: CI — Test & SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  checks: write        # Required for publishing test results
  pull-requests: write # Required for PR comments

jobs:
  build-and-test:
    name: 🧪 Build, Test & Analyze
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hms_doctor
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: 📥 Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud blame info

      # ── 2. JDK 21 Setup ───────────────────────────────────────────
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Fix mvnw permission ────────────────────────────────────
      - name: 🔧 Grant execute permission to mvnw
        run: chmod +x ./mvnw

      # ── 4. Cache Maven ────────────────────────────────────────────
      - name: 📦 Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 5. Cache SonarCloud ───────────────────────────────────────
      - name: 📦 Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # ── 6. Wait for MySQL ─────────────────────────────────────────
      - name: ⏳ Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
          done

      # ── 7. Run Tests with Coverage ────────────────────────────────
      - name: 🧪 Run Tests with Coverage
        run: ./mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/hms_doctor
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      # ── 8. Publish Test Results ───────────────────────────────────
      - name: 📊 Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/target/surefire-reports/*.xml'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. SonarCloud Analysis ────────────────────────────────────
      # - name: 🔍 SonarCloud Analysis
      #   run: |
      #     ./mvnw sonar:sonar \
      #       -Dsonar.projectKey=LokiNaik_doctor-service \
      #       -Dsonar.organization=lokinaik \
      #       -Dsonar.host.url=https://sonarcloud.io \
      #       -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
      #       -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
      #       -Dsonar.java.source=21
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Upload Coverage Artifact ──────────────────────────────
      - name: 📈 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
